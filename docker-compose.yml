version: "3.9"

x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  volumes:
    - storage:/data/storage
    - ./rift:/app/rift
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rift
      POSTGRES_USER: rift
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-riftpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rift"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    <<: *app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn rift.api.app:app --host 0.0.0.0 --port 8000
             --workers 4 --loop uvloop --http httptools"
    ports:
      - "8000:8000"

  worker_render:
    <<: *app
    command: celery -A rift.worker.celery:celery_app worker
             --queues render --concurrency 2
             --loglevel INFO --hostname render@%h
             --max-tasks-per-child 10

  worker_preview:
    <<: *app
    command: celery -A rift.worker.celery:celery_app worker
             --queues preview --concurrency 4
             --loglevel INFO --hostname preview@%h
             --max-tasks-per-child 50

  worker_beat:
    <<: *app
    command: celery -A rift.worker.celery:celery_app beat
             --loglevel INFO --scheduler celery.beat:PersistentScheduler

  flower:
    <<: *app
    command: celery -A rift.worker.celery:celery_app flower
             --port 5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASS:-flowerpass}
    ports:
      - "5555:5555"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./rift/web/static:/static:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  storage:
  certbot_www:
  certbot_conf: